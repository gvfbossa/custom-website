<header
  class="fixed top-0 left-0 w-full backdrop-blur-sm bg-bg-main/80 shadow-sm z-50 transition-all"
>
  <div
    class="max-w-7xl mx-auto px-5 md:px-6 py-4 flex justify-between items-center"
  >
    <!-- LOGO -->
    <div class="flex items-center gap-3 md:gap-4">
      <img
        src="assets/images/logo.png"
        alt="SiteFácilJá"
        class="h-10 md:h-14 cursor-pointer"
        (click)="scrollToZero(); closeMenu()"
      />

      <h1
        (click)="scrollToZero(); closeMenu()"
        class="text-sm md:text-xl font-bold text-primary cursor-pointer hover:scale-105 transition"
      >
        Fraternidade Santo Agostinho
      </h1>
    </div>

    <!-- NAV DESKTOP -->
    <nav class="hidden md:flex gap-8 text-text-secondary font-medium">
      <a href="#about" class="relative group"
        >Sobre<span
          class="absolute left-0 -bottom-1 w-0 h-0.5 bg-primary transition-all group-hover:w-full"
        ></span
      ></a>
      <a href="#services" class="relative group"
        >Serviços<span
          class="absolute left-0 -bottom-1 w-0 h-0.5 bg-primary transition-all group-hover:w-full"
        ></span
      ></a>
      <a href="#product" class="relative group"
        >Produto<span
          class="absolute left-0 -bottom-1 w-0 h-0.5 bg-primary transition-all group-hover:w-full"
        ></span
      ></a>
      <a href="#como-funciona" class="relative group"
        >Como Funciona<span
          class="absolute left-0 -bottom-1 w-0 h-0.5 bg-primary transition-all group-hover:w-full"
        ></span
      ></a>
      <a href="#testimonials" class="relative group"
        >Depoimentos<span
          class="absolute left-0 -bottom-1 w-0 h-0.5 bg-primary transition-all group-hover:w-full"
        ></span
      ></a>
      <a href="#contact" class="relative group"
        >Contato<span
          class="absolute left-0 -bottom-1 w-0 h-0.5 bg-primary transition-all group-hover:w-full"
        ></span
      ></a>
    </nav>

    <!-- CTA DESKTOP -->
    <a
      href="#contact"
      class="hidden md:inline-block bg-primary text-white px-5 py-2 rounded-lg shadow-md hover:shadow-xl hover:scale-105 transition duration-300"
    >
      Entre em Contato
    </a>

    <!-- BOTÃO HAMBURGER -->
    <button class="md:hidden flex flex-col gap-1" (click)="toggleMenu()">
      <span class="w-6 h-0.5 bg-icon transition-all"></span>
      <span class="w-6 h-0.5 bg-icon transition-all"></span>
      <span class="w-6 h-0.5 bg-icon transition-all"></span>
    </button>
  </div>

  <!-- MENU MOBILE -->
  <div
    *ngIf="menuOpen"
    (click)="$event.stopPropagation()"
    class="fixed w-[100%] bg-bg-soft z-50 flex flex-col items-center justify-center space-y-2 pb-6 text-md font-semibold text-text-secondary transition-all"
  >
    <a href="#about" (click)="closeMenu()">Sobre</a>
    <a href="#services" (click)="closeMenu()">Serviços</a>
    <a href="#product" (click)="closeMenu()">Produto</a>
    <a href="#como-funciona" (click)="closeMenu()">Como Funciona</a>
    <a href="#testimonials" (click)="closeMenu()">Depoimentos</a>
    <a href="#contact" (click)="closeMenu()">Contato</a>

    <a
      href="#contact"
      (click)="closeMenu()"
      class="mt-6 bg-primary text-sm text-white px-8 py-2 rounded-xl shadow-lg"
    >
      Solicitar Orçamento
    </a>
  </div>
</header>

<!-- OVERLAY -->
<div
  *ngIf="menuOpen"
  class="fixed inset-0 z-40 bg-black/30 backdrop-blur-sm"
  (click)="closeMenu()"
></div>
